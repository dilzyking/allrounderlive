<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match - Reddy Book Live</title>
    <style>
        :root {
            --bg-deep: #060914;
            --bg-card: #0d1128;
            --bg-row: #101630;
            --bg-row-alt: #131933;
            --border: #1e2545;
            --gold: #e8b96a;
            --gold-dim: #c49558;
            --back-blue: #2196f3;
            --back-blue-dim: #1565c0;
            --lay-pink: #e91e63;
            --lay-pink-dim: #880e4f;
            --green: #00c853;
            --red: #f44336;
            --text-muted: #8899bb;
            --text-bright: #e8eeff;
            --red-hdr: #b71c1c;
            --blue-hdr: #0d47a1;
            --green-hdr: #1b5e20;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            overflow-x: hidden;
            font-size: clamp(11px, 2.8vw, 13px);
        }

        /* HEADER */
        .header {
            background: linear-gradient(180deg, #0d1433 0%, #080d1e 100%);
            padding: clamp(8px, 2.5vw, 12px) clamp(12px, 4vw, 18px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }
        .logo {
            font-size: clamp(16px, 5vw, 22px);
            font-weight: 900;
            color: var(--gold);
            letter-spacing: clamp(1px, 0.5vw, 3px);
            cursor: pointer;
            text-transform: uppercase;
        }
        .logo-small {
            font-size: clamp(7px, 1.8vw, 9px);
            display: block;
            color: var(--gold-dim);
            letter-spacing: 1.5px;
            font-weight: 500;
        }
        .header-right { display: flex; align-items: center; gap: clamp(8px, 2vw, 12px); }
        .balance-display {
            background: rgba(232,185,106,0.1);
            border: 1px solid var(--gold);
            border-radius: 6px;
            padding: clamp(4px,1.5vw,7px) clamp(8px,2.5vw,14px);
            font-size: clamp(11px, 2.8vw, 13px);
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* MATCH HERO */
        .match-hero {
            background: linear-gradient(180deg, #0d1433 0%, #080d1e 100%);
            border-bottom: 1px solid var(--border);
            padding: clamp(10px, 3vw, 14px) clamp(12px, 4vw, 18px);
        }
        .league-name {
            color: var(--gold);
            font-size: clamp(9px, 2.2vw, 11px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }
        .match-title {
            font-size: clamp(13px, 3.5vw, 16px);
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .match-meta { display: flex; align-items: center; gap: clamp(6px, 2vw, 10px); flex-wrap: wrap; }
        .status-badge {
            padding: 3px clamp(8px, 2.5vw, 12px);
            border-radius: 4px;
            font-size: clamp(9px, 2.2vw, 11px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-live { background: #b71c1c; animation: livePulse 1.5s infinite; }
        .status-upcoming { background: #37474f; }
        .status-ended { background: #212121; }
        @keyframes livePulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(183,28,28,0.4)} 50%{opacity:0.85;box-shadow:0 0 0 4px rgba(183,28,28,0)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .match-date-time { color: var(--text-muted); font-size: clamp(9px, 2.2vw, 11px); }
        .inplay-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }

        /* TABS */
        .tab-nav {
            display: flex;
            background: #0a0f26;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: clamp(8px,2.5vw,11px) clamp(12px,3.5vw,18px);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: clamp(11px, 2.8vw, 13px);
            font-weight: 700;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .tab-btn:hover { color: var(--text-bright); }

        /* SECTIONS */
        .section { margin-bottom: 4px; }
        .section-header {
            background: linear-gradient(90deg, var(--red-hdr) 0%, #7f0000 100%);
            padding: clamp(7px, 2vw, 10px) clamp(12px, 3.5vw, 16px);
            font-size: clamp(10px, 2.5vw, 12px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-header.bookmaker-hdr { background: linear-gradient(90deg, var(--blue-hdr) 0%, #082966 100%); }
        .section-header.fancy-hdr { background: linear-gradient(90deg, var(--green-hdr) 0%, #0a3d12 100%); }
        .section-header.premium-hdr { background: linear-gradient(90deg, #4a148c 0%, #280b50 100%); }

        /* ===== MATCH ODDS TABLE — FULLY RESPONSIVE ===== */
        .odds-table { width: 100%; table-layout: fixed; }

        .odds-table-header {
            display: grid;
            grid-template-columns: 1fr repeat(3, clamp(44px, 12vw, 72px)) repeat(3, clamp(44px, 12vw, 72px));
            background: #080d1e;
            padding: 5px clamp(8px, 3vw, 14px);
            font-size: clamp(9px, 2.2vw, 11px);
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .odds-table-header .back-lbl {
            color: var(--back-blue);
            text-align: center;
            grid-column: 2/5;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .odds-table-header .lay-lbl {
            color: var(--lay-pink);
            text-align: center;
            grid-column: 5/8;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .runner-row {
            display: grid;
            grid-template-columns: 1fr repeat(3, clamp(44px, 12vw, 72px)) repeat(3, clamp(44px, 12vw, 72px));
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding: 0 clamp(8px, 3vw, 14px);
            background: var(--bg-row);
            min-height: clamp(46px, 12vw, 58px);
            transition: background 0.15s;
        }
        .runner-row:hover { background: var(--bg-row-alt); }

        .runner-name-col { padding: clamp(6px, 1.5vw, 9px) 0; min-width: 0; }
        .runner-name {
            font-weight: 800;
            font-size: clamp(11px, 2.8vw, 13px);
            color: var(--text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .runner-profit { font-size: clamp(9px, 2.2vw, 11px); margin-top: 2px; }
        .runner-profit.green { color: var(--green); }
        .runner-profit.red { color: var(--red); }

        .odd-cell {
            text-align: center;
            padding: clamp(3px, 1vw, 5px) clamp(2px, 0.8vw, 4px);
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s, filter 0.1s;
            margin: clamp(2px, 0.8vw, 4px) clamp(1px, 0.5vw, 3px);
        }
        .odd-cell:active { transform: scale(0.92); }
        .odd-cell .price {
            font-size: clamp(11px, 3vw, 14px);
            font-weight: 800;
            line-height: 1.2;
        }
        .odd-cell .size {
            font-size: clamp(8px, 2vw, 10px);
            color: rgba(255,255,255,0.55);
            margin-top: 1px;
        }

        .back-cell { background: rgba(33,150,243,0.12); border: 1px solid rgba(33,150,243,0.25); }
        .back-cell:hover { background: rgba(33,150,243,0.22); filter: brightness(1.1); }
        .back-cell .price { color: #90caf9; }
        .lay-cell { background: rgba(233,30,99,0.12); border: 1px solid rgba(233,30,99,0.25); }
        .lay-cell:hover { background: rgba(233,30,99,0.22); filter: brightness(1.1); }
        .lay-cell .price { color: #f48fb1; }

        .odd-cell.best-back { background: var(--back-blue); border: none; }
        .odd-cell.best-back:hover { background: #42a5f5; filter: brightness(1.05); }
        .odd-cell.best-back .price { color: #fff; font-weight: 900; }
        .odd-cell.best-back .size { color: rgba(255,255,255,0.7); }

        .odd-cell.best-lay { background: var(--lay-pink); border: none; }
        .odd-cell.best-lay:hover { background: #ec407a; filter: brightness(1.05); }
        .odd-cell.best-lay .price { color: #fff; font-weight: 900; }
        .odd-cell.best-lay .size { color: rgba(255,255,255,0.7); }

        /* SUSPENDED OVERLAY */
        .suspended-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(183,28,28,0.12);
            grid-column: 2/8;
            font-weight: 800;
            color: #ef5350;
            font-size: clamp(10px, 2.5vw, 12px);
            letter-spacing: 2px;
            border: 1px solid rgba(183,28,28,0.3);
            border-radius: 4px;
            margin: 4px 0;
            min-height: 40px;
        }

        /* BOOKMAKER TABLE */
        .bm-table-header {
            display: grid;
            grid-template-columns: 1fr clamp(70px, 20vw, 100px) clamp(70px, 20vw, 100px);
            background: #080d1e;
            padding: 5px clamp(8px, 3vw, 14px);
            font-size: clamp(9px, 2.2vw, 11px);
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .bm-row {
            display: grid;
            grid-template-columns: 1fr clamp(70px, 20vw, 100px) clamp(70px, 20vw, 100px);
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding: 4px clamp(8px, 3vw, 14px);
            background: var(--bg-row);
            min-height: clamp(44px, 11vw, 54px);
            transition: background 0.15s;
        }
        .bm-row:hover { background: var(--bg-row-alt); }
        .bm-odd-cell {
            text-align: center;
            padding: clamp(5px, 1.5vw, 8px) clamp(3px, 1vw, 6px);
            cursor: pointer;
            border-radius: 5px;
            margin: clamp(2px, 0.5vw, 3px);
            transition: transform 0.1s, filter 0.1s;
        }
        .bm-odd-cell:active { transform: scale(0.93); }
        .bm-back { background: var(--back-blue); color: #fff; font-weight: 700; }
        .bm-back:hover { filter: brightness(1.1); }
        .bm-lay { background: var(--lay-pink); color: #fff; font-weight: 700; }
        .bm-lay:hover { filter: brightness(1.1); }
        .bm-odd-price { font-size: clamp(12px, 3vw, 15px); font-weight: 800; }
        .bm-odd-size { font-size: clamp(8px, 2vw, 10px); opacity: 0.75; }

        /* FANCY TABLE */
        .fancy-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding: clamp(5px, 1.5vw, 8px) clamp(8px, 3vw, 14px);
            background: var(--bg-row);
            gap: clamp(6px, 2vw, 10px);
            min-height: clamp(44px, 11vw, 54px);
            transition: background 0.15s;
        }
        .fancy-row:hover { background: var(--bg-row-alt); }
        .fancy-name { flex: 1; font-size: clamp(11px, 2.8vw, 13px); font-weight: 600; color: var(--text-bright); min-width: 0; }
        .fancy-msg { font-size: clamp(9px, 2.2vw, 10px); color: #ffd54f; margin-top: 2px; }
        .fancy-cell {
            width: clamp(62px, 18vw, 82px);
            text-align: center;
            padding: clamp(5px, 1.5vw, 7px) clamp(3px, 1vw, 5px);
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
            flex-shrink: 0;
        }
        .fancy-cell:active { transform: scale(0.93); }
        .fancy-no { background: var(--lay-pink); color: #fff; font-weight: 700; }
        .fancy-no:hover { filter: brightness(1.1); }
        .fancy-yes { background: var(--back-blue); color: #fff; font-weight: 700; }
        .fancy-yes:hover { filter: brightness(1.1); }
        .fancy-price { font-size: clamp(12px, 3vw, 15px); font-weight: 800; }
        .fancy-run { font-size: clamp(8px, 2vw, 10px); opacity: 0.8; }

        /* BET SLIP */
        .bet-slip-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            justify-content: flex-end;
            align-items: flex-end;
            backdrop-filter: blur(3px);
        }
        .bet-slip-overlay.active { display: flex; }
        .bet-slip {
            background: linear-gradient(180deg, #0d1433 0%, #060914 100%);
            width: 100%;
            max-width: 480px;
            border-top: 2px solid var(--gold);
            border-radius: 14px 14px 0 0;
            padding: clamp(14px, 4vw, 20px);
            animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .bet-slip-title {
            color: var(--gold);
            font-weight: 800;
            font-size: clamp(13px, 3.5vw, 15px);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }
        .bet-info {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: clamp(8px, 2.5vw, 12px) clamp(10px, 3vw, 14px);
            margin-bottom: 12px;
        }
        .bet-info-row { display: flex; justify-content: space-between; font-size: clamp(11px, 2.8vw, 13px); margin-bottom: 5px; }
        .bet-info-label { color: var(--text-muted); }
        .bet-info-value { font-weight: 700; }
        .bet-info-value.back { color: #90caf9; }
        .bet-info-value.lay { color: #f48fb1; }

        .stake-section { margin-bottom: 12px; }
        .stake-label { color: var(--text-muted); font-size: clamp(10px, 2.5vw, 12px); margin-bottom: 5px; }
        .stake-input {
            width: 100%;
            padding: clamp(9px, 2.5vw, 12px);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold);
            border-radius: 7px;
            color: #fff;
            font-size: clamp(15px, 4vw, 18px);
            font-weight: 800;
            text-align: center;
        }
        .stake-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px rgba(232,185,106,0.3); }

        .quick-stakes { display: flex; gap: clamp(4px, 1.5vw, 7px); flex-wrap: wrap; margin-bottom: 12px; }
        .quick-stake-btn {
            flex: 1; min-width: clamp(44px, 12vw, 60px);
            padding: clamp(6px, 2vw, 9px) clamp(3px, 1vw, 5px);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--gold);
            border-radius: 6px;
            cursor: pointer;
            font-size: clamp(10px, 2.5vw, 12px);
            font-weight: 700;
            text-align: center;
            transition: all 0.15s;
        }
        .quick-stake-btn:hover { background: var(--gold); color: var(--bg-deep); border-color: var(--gold); }

        .pnl-row {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: clamp(7px, 2vw, 10px) clamp(10px, 3vw, 14px);
            border-radius: 7px;
            margin-bottom: 12px;
        }
        .pnl-label { font-size: clamp(10px, 2.5vw, 11px); color: var(--text-muted); }
        .pnl-value { font-size: clamp(12px, 3vw, 14px); font-weight: 800; margin-top: 2px; }
        .pnl-value.profit { color: var(--green); }
        .pnl-value.loss { color: var(--red); }

        .place-bet-btn {
            width: 100%;
            padding: clamp(12px, 3vw, 15px);
            background: linear-gradient(135deg, var(--gold) 0%, #c49558 100%);
            color: var(--bg-deep);
            border: none;
            border-radius: 8px;
            font-size: clamp(13px, 3.5vw, 15px);
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .place-bet-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,185,106,0.4); }
        .place-bet-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

        /* TOAST / POPUP */
        .toast {
            position: fixed;
            bottom: clamp(16px, 5vw, 24px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 2px solid var(--green);
            color: #fff;
            padding: clamp(11px, 3vw, 15px) clamp(16px, 4vw, 22px);
            border-radius: 10px;
            z-index: 999;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 700;
            min-width: clamp(220px, 60vw, 280px);
            text-align: center;
            animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .toast.error { border-color: var(--red); }
        .toast.warning { border-color: #ff9800; }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

        /* SUCCESS POPUP */
        .success-popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 300;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .success-popup-overlay.active { display: flex; }
        .success-popup {
            background: linear-gradient(135deg, #0d1433 0%, #060914 100%);
            border: 2px solid var(--green);
            border-radius: 14px;
            padding: clamp(22px, 6vw, 32px);
            width: 88%;
            max-width: 340px;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
        .success-icon { font-size: clamp(36px, 10vw, 48px); margin-bottom: 10px; }
        .success-title { font-size: clamp(16px, 4vw, 20px); font-weight: 900; color: var(--green); margin-bottom: 8px; letter-spacing: 0.5px; }
        .success-msg { font-size: clamp(11px, 2.8vw, 13px); color: var(--text-muted); margin-bottom: 18px; line-height: 1.6; }
        .success-close-btn {
            padding: clamp(9px, 2.5vw, 12px) clamp(24px, 7vw, 32px);
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: clamp(13px, 3vw, 15px);
            font-weight: 800;
            cursor: pointer;
        }

        /* BET HISTORY */
        .bet-history-section { padding: 0 0 80px; }
        .bet-history-header {
            padding: clamp(8px, 2.5vw, 11px) clamp(12px, 3.5vw, 16px);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            font-size: clamp(12px, 3vw, 14px);
            color: var(--gold);
        }
        .bet-item {
            background: var(--bg-row);
            border-bottom: 1px solid var(--border);
            padding: clamp(9px, 2.5vw, 12px) clamp(12px, 3.5vw, 16px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: background 0.15s;
        }
        .bet-item:hover { background: var(--bg-row-alt); }
        .bet-item-left { flex: 1; }
        .bet-item-name { font-weight: 800; font-size: clamp(12px, 3vw, 14px); margin-bottom: 3px; }
        .bet-item-meta { font-size: clamp(10px, 2.5vw, 11px); color: var(--text-muted); }
        .bet-item-right { text-align: right; }
        .bet-item-stake { font-weight: 800; font-size: clamp(12px, 3vw, 14px); }
        .bet-item-status { font-size: clamp(10px, 2.2vw, 11px); font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-top: 3px; display: inline-block; }
        .bet-status-pending { background: rgba(255,193,7,0.12); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
        .bet-status-won { background: rgba(0,200,83,0.12); color: var(--green); border: 1px solid rgba(0,200,83,0.3); }
        .bet-status-lost { background: rgba(244,67,54,0.12); color: var(--red); border: 1px solid rgba(244,67,54,0.3); }

        /* MATCH END BANNER */
        .match-ended-banner {
            background: linear-gradient(90deg, #b71c1c 0%, #6a0000 100%);
            padding: clamp(10px, 3vw, 14px) clamp(12px, 4vw, 18px);
            text-align: center;
            font-weight: 800;
            font-size: clamp(12px, 3vw, 14px);
            letter-spacing: 2px;
        }

        /* MARKET SUSPENDED */
        .market-suspended {
            background: rgba(183,28,28,0.08);
            border: 1px solid rgba(183,28,28,0.3);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            color: #ef5350;
            font-weight: 800;
            font-size: clamp(10px, 2.5vw, 12px);
            letter-spacing: 2px;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBEITIEDtG_Yq2iBlb7sjJWnnFIzE5C8r8",
    authDomain: "fun-play-33764.firebaseapp.com",
    databaseURL: "https://fun-play-33764-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "fun-play-33764"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const eventId = new URLSearchParams(location.search).get("eventId");
let matchEnded = false;
let currentBetData = null;
let matchData = null;
let controlData = null;

// ============ INIT ============
init();

async function init() {
    if (!localStorage.getItem("userId")) {
        showToast("Please login to bet", "error");
    }
    loadBalance();
    await loadControl();
    await loadMatch();
    loadBetHistory();

    // Auto refresh every 1 second
    setInterval(async () => {
        if (!matchEnded) {
            await loadControl();
            await loadMatch(true); // silent refresh
        }
    }, 1000);

    // Balance refresh every 5s
    setInterval(loadBalance, 5000);
}

// ============ CONTROL ============
async function loadControl() {
    try {
        const res = await fetch("https://allrounderlive.in/control.json?t=" + Date.now());
        controlData = await res.json();
        const c = controlData[eventId];

        if (c && c.status === "ENDED") {
            matchEnded = true;
            document.getElementById("endedBanner").style.display = "block";
            const winnerSid = c.winner;
            if (matchData) {
                const winRunner = matchData.selection_runners?.find(r => r.SID == winnerSid);
                document.getElementById("winnerDisplay").innerText = winRunner ? winRunner.RN : winnerSid;
            }
            checkSettlement(c.winner);
        }

        const statusBadge = document.getElementById("statusBadge");
        if (c?.status === "ENDED") {
            statusBadge.className = "status-badge status-ended";
            statusBadge.innerText = "ENDED";
        } else if (matchData?.inplay) {
            statusBadge.className = "status-badge status-live";
            statusBadge.innerText = "🔴 LIVE";
            document.getElementById("liveIndicator").style.display = "inline-block";
            document.getElementById("refreshIndicator").style.display = "flex";
        } else {
            statusBadge.className = "status-badge status-upcoming";
            statusBadge.innerText = c?.status || "UPCOMING";
        }
    } catch (e) { console.log("Control load error", e); }
}

// ============ LOAD MATCH ============
async function loadMatch(silent = false) {
    try {
        const res = await fetch(`https://central.zplay1.in/pb/api/v1/events/matchDetails/${eventId}?t=${Date.now()}`);
        const json = await res.json();
        if (!json.success) return;
        matchData = json.data.match;

        if (!silent) renderMatchInfo();
        renderMatchOdds();
        renderBookmakers();
        renderFancy();
    } catch (e) { console.log("Match load error", e); }
}

function renderMatchInfo() {
    document.getElementById("leagueName").innerText = matchData.leaguesName || "Cricket";
    document.getElementById("matchTitle").innerText = matchData.eventName || "—";
    const d = new Date(matchData.eventDate);
    document.getElementById("matchDateTime").innerText = d.toLocaleDateString("en-IN", {day:"2-digit",month:"short",year:"numeric"}) + " • " + d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    document.title = matchData.eventName + " — Allrounder Live";
}

// ============ MATCH ODDS (ALL MARKETS) ============
function renderMatchOdds() {
    const container = document.getElementById("allMarketsContainer");
    if (!matchData?.matchOddData?.length) {
        container.innerHTML = '<div class="no-data">No markets available</div>';
        return;
    }
    container.innerHTML = "";

    matchData.matchOddData.forEach(market => {
        const suspended = market.st !== "OPEN";
        const div = document.createElement("div");
        div.className = "section";
        div.id = `market-${market.id}`;

        const runnerNames = market.runnerName || matchData.selection_runners || [];

        let runnersHTML = "";
        market.runners.forEach(r => {
            const info = runnerNames.find(n => n.SID == r.sid || n.SID == r.sid);
            const name = info?.RN || r.sid;
            const backs = r.ex?.b || [];
            const lays = r.ex?.l || [];

            // Profit/loss preview
            const existingBets = getLocalBets().filter(b => b.eventId == eventId && b.selectionId == r.sid);
            const profit = existingBets.reduce((s,b) => s + (b.stake * (b.odds-1)), 0);
            const loss = existingBets.reduce((s,b) => s - b.stake, 0);

            let profitHTML = "";
            if (existingBets.length > 0) {
                profitHTML = `
                    <div class="runner-profit green">+₹${profit.toFixed(0)} if wins</div>
                    <div class="runner-profit red">₹${loss.toFixed(0)} if loses</div>`;
            }

            // Winner label
            const c = controlData?.[eventId];
            let winnerHTML = "";
            if (c?.status === "ENDED" && c?.winner == r.sid) {
                winnerHTML = `<div class="winner-label">🏆 WINNER</div>`;
            }

            // Back cells (show 3: best first, then 2 others)
            const backCells = [0,1,2].map(i => {
                const b = backs[i];
                if (!b) return `<div class="odd-cell ${i===0?'best-back':'back-cell'}"><div class="price">—</div><div class="size">—</div></div>`;
                return `<div class="odd-cell ${i===0?'best-back':'back-cell'}" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)}','back',${b.p},${b.s})">
                    <div class="price">${b.p}</div><div class="size">${fmtSize(b.s)}</div></div>`;
            });

            // Lay cells
            const layCells = [0,1,2].map(i => {
                const l = lays[i];
                if (!l) return `<div class="odd-cell ${i===0?'best-lay':'lay-cell'}"><div class="price">—</div><div class="size">—</div></div>`;
                return `<div class="odd-cell ${i===0?'best-lay':'lay-cell'}" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)}','lay',${l.p},${l.s})">
                    <div class="price">${l.p}</div><div class="size">${fmtSize(l.s)}</div></div>`;
            });

            runnersHTML += `
                <div class="runner-row">
                    <div class="runner-name-col">
                        <div class="runner-name">${escHtml(name)}</div>
                        ${winnerHTML}
                        ${profitHTML}
                    </div>
                    ${suspended ? `<div class="suspended-overlay">SUSPENDED</div>` : (backCells.join('') + layCells.join(''))}
                </div>`;
        });

        div.innerHTML = `
            <div class="section-header">
                <span>${escHtml(market.marketName)}</span>
                <span style="font-size:10px;color:rgba(255,255,255,0.7);">Min: ₹${market.min_stake_limit} | Max: ₹${market.inplay_stake_limit?.toLocaleString()}</span>
            </div>
            <div class="odds-table">
                <div class="odds-table-header">
                    <span></span>
                    <span class="back-lbl">← BACK</span>
                    <span class="lay-lbl">LAY →</span>
                </div>
                ${runnersHTML}
            </div>`;
        container.appendChild(div);
    });
}

// ============ BOOKMAKERS ============
function renderBookmakers() {
    const container = document.getElementById("bookmakersContainer");
    if (!matchData?.hasBookmaker) {
        container.innerHTML = '<div class="no-data">No bookmaker markets available</div>';
        return;
    }

    // Find bookmaker-like markets (matchOddData has simpler back/lay = bookmaker style)
    const bmMarkets = matchData.matchOddData.filter(m => m.marketName === "Who Will Win The Match?" || m.marketName?.toLowerCase().includes("bookmaker"));
    if (!bmMarkets.length) {
        // Use first market as bookmaker demo
        const m = matchData.matchOddData[0];
        if (!m) { container.innerHTML = '<div class="no-data">No bookmaker data</div>'; return; }
        renderBookmakerMarket(container, m);
    } else {
        container.innerHTML = "";
        bmMarkets.forEach(m => renderBookmakerMarket(container, m));
    }
}

function renderBookmakerMarket(container, market) {
    const runnerNames = market.runnerName || matchData.selection_runners || [];
    let rowsHTML = "";
    market.runners.forEach(r => {
        const info = runnerNames.find(n => n.SID == r.sid);
        const name = info?.RN || r.sid;
        const back = r.ex?.b?.[0];
        const lay = r.ex?.l?.[0];

        // Profit/loss
        const existingBets = getLocalBets().filter(b => b.eventId == eventId && b.selectionId == r.sid);
        const profit = existingBets.reduce((s,b) => s + (b.stake * (b.odds-1)), 0);
        const loss = existingBets.reduce((s,b) => s - b.stake, 0);
        let profitHTML = "";
        if (existingBets.length > 0) {
            profitHTML = `<div class="runner-profit green" style="font-size:10px;">+₹${profit.toFixed(0)}</div><div class="runner-profit red" style="font-size:10px;">₹${loss.toFixed(0)}</div>`;
        }

        rowsHTML += `
            <div class="bm-row">
                <div>
                    <div class="runner-name">${escHtml(name)}</div>
                    ${profitHTML}
                </div>
                <div class="bm-odd-cell bm-back" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)} (BM)','back',${back?.p||0},${back?.s||0})">
                    <div class="bm-odd-price">${back?.p || '—'}</div>
                    <div class="bm-odd-size">${back ? fmtSize(back.s) : ''}</div>
                </div>
                <div class="bm-odd-cell bm-lay" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)} (BM)','lay',${lay?.p||0},${lay?.s||0})">
                    <div class="bm-odd-price">${lay?.p || '—'}</div>
                    <div class="bm-odd-size">${lay ? fmtSize(lay.s) : ''}</div>
                </div>
            </div>`;
    });

    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `
        <div class="section-header bookmaker-hdr">
            <span>📋 BOOKMAKER — ${escHtml(market.marketName)}</span>
            <span style="font-size:10px;color:rgba(255,255,255,0.7);">Max: ₹${market.stake_limit?.toLocaleString()}</span>
        </div>
        <div class="bm-table-header">
            <span>Selection</span>
            <span style="text-align:center;color:#90caf9;">BACK</span>
            <span style="text-align:center;color:#f48fb1;">LAY</span>
        </div>
        ${rowsHTML}`;
    container.appendChild(sec);
}

// ============ FANCY ============
function renderFancy() {
    const container = document.getElementById("fancyContainer");
    const fancyData = matchData?.fancyOddData?.ml;
    if (!fancyData?.length) {
        container.innerHTML = '<div class="no-data">No fancy markets available</div>';
        return;
    }
    container.innerHTML = "";

    // Group by category
    const groups = {};
    fancyData.forEach(f => {
        const cat = f.cat || "other";
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(f);
    });

    Object.entries(groups).forEach(([cat, items]) => {
        const catLabel = cat.replace(/_/g," ").toUpperCase();
        const sec = document.createElement("div");
        sec.className = "section";

        let rowsHTML = "";
        items.forEach(f => {
            const susp = f.sn !== "ONLINE";
            rowsHTML += `
                <div class="fancy-row">
                    <div class="fancy-name">
                        ${escHtml(f.mn)}
                        ${f.msg ? `<div class="fancy-msg">${escHtml(f.msg)}</div>` : ''}
                    </div>
                    ${susp ? `<div style="color:#dc3545;font-size:11px;font-weight:700;letter-spacing:1px;">SUSPENDED</div>` : `
                    <div class="fancy-cell fancy-no" onclick="openFancyBetSlip(${f.mi},'${escHtml(f.mn)}','no',${f.rn},${f.on})">
                        <div class="fancy-price">${f.rn}</div>
                        <div class="fancy-run">${f.on}%</div>
                    </div>
                    <div class="fancy-cell fancy-yes" onclick="openFancyBetSlip(${f.mi},'${escHtml(f.mn)}','yes',${f.ry},${f.oy})">
                        <div class="fancy-price">${f.ry}</div>
                        <div class="fancy-run">${f.oy}%</div>
                    </div>`}
                </div>`;
        });

        sec.innerHTML = `
            <div class="section-header fancy-hdr">
                <span>🎯 ${catLabel}</span>
                <span style="font-size:10px;color:rgba(255,255,255,0.7);">Min: ₹100</span>
            </div>
            <div style="display:flex;background:#080d1e;padding:5px 14px;font-size:10px;color:#8899bb;border-bottom:1px solid #1e2545;">
                <span style="flex:1;">Market</span>
                <span style="width:clamp(62px,18vw,82px);text-align:center;color:#f48fb1;">NO</span>
                <span style="width:clamp(62px,18vw,82px);text-align:center;color:#90caf9;">YES</span>
            </div>
            ${rowsHTML}`;
        container.appendChild(sec);
    });
}

// ============ BET SLIP ============
window.openBetSlip = function(selectionId, name, market, type, odds, size) {
    if (!localStorage.getItem("userId")) { showToast("Please login to bet", "error"); return; }
    if (matchEnded) { showToast("Match has ended. Betting closed.", "warning"); return; }
    if (!odds || odds === 0) { showToast("Invalid odds", "error"); return; }

    currentBetData = { selectionId, name, market, type, odds, size, isFancy: false };
    document.getElementById("slipSelection").innerText = name;
    document.getElementById("slipMarket").innerText = market;
    document.getElementById("slipType").innerText = type.toUpperCase();
    document.getElementById("slipType").className = "bet-info-value " + type;
    document.getElementById("slipOdds").innerText = odds;
    document.getElementById("stakeInput").value = 100;
    updatePnl();
    document.getElementById("betSlipOverlay").classList.add("active");
};

window.openFancyBetSlip = function(marketId, marketName, type, runs, pct) {
    if (!localStorage.getItem("userId")) { showToast("Please login to bet", "error"); return; }
    if (matchEnded) { showToast("Match has ended. Betting closed.", "warning"); return; }

    currentBetData = { selectionId: marketId, name: marketName, market: "Fancy", type, odds: pct/100, runs, isFancy: true };
    document.getElementById("slipSelection").innerText = marketName;
    document.getElementById("slipMarket").innerText = "Fancy";
    document.getElementById("slipType").innerText = type.toUpperCase() + " @ " + runs + " runs";
    document.getElementById("slipType").className = "bet-info-value " + (type==="yes"?"back":"lay");
    document.getElementById("slipOdds").innerText = runs + " runs @ " + pct + "%";
    document.getElementById("stakeInput").value = 100;
    updatePnl();
    document.getElementById("betSlipOverlay").classList.add("active");
};

window.closeBetSlip = function(e) {
    if (e.target === document.getElementById("betSlipOverlay")) closeBetSlipDirect();
};
window.closeBetSlipDirect = function() {
    document.getElementById("betSlipOverlay").classList.remove("active");
};

window.updatePnl = function() {
    if (!currentBetData) return;
    const stake = parseFloat(document.getElementById("stakeInput").value) || 0;
    let profit, loss;

    if (currentBetData.isFancy) {
        profit = stake * currentBetData.odds;
        loss = stake;
    } else if (currentBetData.type === "back") {
        profit = stake * (currentBetData.odds - 1);
        loss = stake;
    } else {
        profit = stake;
        loss = stake * (currentBetData.odds - 1);
    }

    document.getElementById("potentialProfit").innerText = "₹" + profit.toFixed(0);
    document.getElementById("potentialLoss").innerText = "₹" + loss.toFixed(0);
};

window.addStake = function(amt) {
    const input = document.getElementById("stakeInput");
    input.value = (parseFloat(input.value) || 0) + amt;
    updatePnl();
};

window.clearStake = function() {
    document.getElementById("stakeInput").value = 100;
    updatePnl();
};

// ============ SUBMIT BET ============
window.submitBet = async function() {
    if (!currentBetData) return;
    if (matchEnded) { showToast("Match has ended. Betting closed.", "warning"); return; }

    const userId = localStorage.getItem("userId");
    if (!userId) { showToast("Please login", "error"); return; }

    const stake = parseFloat(document.getElementById("stakeInput").value) || 0;
    if (stake < 100) { showToast("Minimum stake is ₹100", "error"); return; }

    document.getElementById("placeBetBtn").disabled = true;
    document.getElementById("placeBetBtn").innerText = "Placing...";

    try {
        const userRef = ref(db, "users/" + userId);
        const snap = await get(userRef);
        if (!snap.exists()) throw new Error("User not found");

        let balance = snap.val().balance;
        if (balance < stake) { showToast("Insufficient balance", "error"); return; }

        balance -= stake;
        await update(userRef, { balance });

        const betRecord = {
            userId,
            eventId,
            matchName: matchData?.eventName || "",
            selectionId: currentBetData.selectionId,
            selectionName: currentBetData.name,
            market: currentBetData.market,
            type: currentBetData.type,
            odds: currentBetData.odds,
            runs: currentBetData.runs || null,
            stake,
            status: "PENDING",
            timestamp: Date.now(),
            isFancy: currentBetData.isFancy || false
        };

        // Save to Firebase
        await push(ref(db, "bets"), betRecord);

        // Save to localStorage
        const localBets = getLocalBets();
        betRecord.localId = Date.now() + Math.random();
        localBets.push(betRecord);
        localStorage.setItem("bets_" + userId, JSON.stringify(localBets));

        // Update UI
        closeBetSlipDirect();
        loadBalance();
        loadBetHistory();
        renderMatchOdds();
        renderBookmakers();

        // Show success popup
        const profit = currentBetData.isFancy
            ? stake * currentBetData.odds
            : currentBetData.type === "back"
                ? stake * (currentBetData.odds - 1)
                : stake;

        document.getElementById("successMsg").innerHTML = `
            <b>${escHtml(currentBetData.name)}</b><br>
            ${currentBetData.type.toUpperCase()} @ ${currentBetData.runs ? currentBetData.runs + " runs" : currentBetData.odds}<br>
            Stake: ₹${stake.toLocaleString()}<br>
            <span style="color:#28a745;">Potential Profit: ₹${profit.toFixed(0)}</span>
        `;
        document.getElementById("successPopup").classList.add("active");

    } catch (e) {
        showToast("Error: " + e.message, "error");
    } finally {
        document.getElementById("placeBetBtn").disabled = false;
        document.getElementById("placeBetBtn").innerText = "PLACE BET";
    }
};

window.closeSuccessPopup = function() {
    document.getElementById("successPopup").classList.remove("active");
};

// ============ BET HISTORY ============
function loadBetHistory() {
    const userId = localStorage.getItem("userId");
    if (!userId) return;

    const bets = getLocalBets().filter(b => b.eventId == eventId);
    const container = document.getElementById("betHistoryList");
    document.getElementById("betCount").innerText = bets.length;

    if (!bets.length) {
        container.innerHTML = '<div class="no-data">No bets placed yet</div>';
        return;
    }

    // Sort newest first
    bets.sort((a,b) => b.timestamp - a.timestamp);

    container.innerHTML = bets.map(b => {
        const statusClass = b.status === "WON" ? "bet-status-won" : b.status === "LOST" ? "bet-status-lost" : "bet-status-pending";
        const profit = b.isFancy
            ? b.stake * b.odds
            : b.type === "back" ? b.stake * (b.odds-1) : b.stake;
        const time = new Date(b.timestamp).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});

        return `
            <div class="bet-item">
                <div class="bet-item-left">
                    <div class="bet-item-name">${escHtml(b.selectionName || b.selectionId)}</div>
                    <div class="bet-item-meta">${escHtml(b.market)} • ${b.type?.toUpperCase()} • ${b.runs ? b.runs+" runs" : "@ "+b.odds} • ${time}</div>
                    <div class="runner-profit green" style="font-size:11px;">Potential: +₹${profit.toFixed(0)}</div>
                </div>
                <div class="bet-item-right">
                    <div class="bet-item-stake">₹${b.stake?.toLocaleString()}</div>
                    <div><span class="bet-item-status ${statusClass}">${b.status}</span></div>
                </div>
            </div>`;
    }).join("");
}

// ============ SETTLEMENT ============
async function checkSettlement(winnerId) {
    const userId = localStorage.getItem("userId");
    if (!userId) return;

    const bets = getLocalBets().filter(b => b.eventId == eventId && b.status === "PENDING");
    if (!bets.length) return;

    const userRef = ref(db, "users/" + userId);
    const snap = await get(userRef);
    let balance = snap.val().balance;
    let updated = false;

    const allBets = getLocalBets();
    allBets.forEach(b => {
        if (b.eventId != eventId || b.status !== "PENDING") return;
        if (b.isFancy) { b.status = "PENDING"; return; } // fancy settled by admin
        if (String(b.selectionId) === String(winnerId)) {
            const winAmt = b.stake + b.stake * (b.odds - 1);
            balance += winAmt;
            b.status = "WON";
            updated = true;
        } else {
            b.status = "LOST";
            updated = true;
        }
    });

    if (updated) {
        localStorage.setItem("bets_" + userId, JSON.stringify(allBets));
        await update(userRef, { balance });
        loadBalance();
        loadBetHistory();
    }
}

// ============ BALANCE ============
async function loadBalance() {
    const userId = localStorage.getItem("userId");
    if (!userId) return;
    try {
        const snap = await get(ref(db, "users/" + userId));
        const bal = snap.val()?.balance || 0;
        document.getElementById("headerBalance").innerText = bal.toLocaleString();
    } catch(e) {}
}

// ============ LOCAL BETS ============
function getLocalBets() {
    const userId = localStorage.getItem("userId");
    if (!userId) return [];
    try {
        return JSON.parse(localStorage.getItem("bets_" + userId) || "[]");
    } catch { return []; }
}

// ============ TABS ============
window.switchTab = function(name, el) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    el.classList.add("active");
    if (name === "bets") loadBetHistory();
};

// ============ HELPERS ============
function fmtSize(s) {
    const n = parseFloat(s);
    if (n >= 100000) return (n/100000).toFixed(1) + "L";
    if (n >= 1000) return (n/1000).toFixed(1) + "K";
    return n.toFixed(0);
}

function escHtml(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

window.showToast = function(msg, type="success") {
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const t = document.createElement("div");
    t.className = "toast " + type;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
};
</script>
