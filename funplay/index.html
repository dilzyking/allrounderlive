<!DOCTYPE html>
<html>
<head>
  <title>Allrounder Live</title>
</head>
<body>

<h2>Signup</h2>
<input id="su_user" placeholder="User ID"><br>
<input id="su_pass" type="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>

<hr>

<h2>Login</h2>
<input id="li_user" placeholder="User ID"><br>
<input id="li_pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<hr>

<h2>Balance: ₹<span id="balance">0</span></h2>

<h2>Matches</h2>
<div id="matches"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEITIEDtG_Yq2iBlb7sjJWnnFIzE5C8r8",
  authDomain: "fun-play-33764.firebaseapp.com",
  databaseURL: "https://fun-play-33764-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fun-play-33764"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// SIGNUP
window.signup = async function () {
  const user = document.getElementById("su_user").value;
  const pass = document.getElementById("su_pass").value;

  if (!user || !pass) return alert("Fill all fields");

  const snap = await get(ref(db, "users/" + user));

  if (snap.exists()) {
    alert("User already exists ❌");
    return;
  }

  await set(ref(db, "users/" + user), {
    password: pass,
    balance: 1000
  });

  alert("Signup success ✅");
};

// LOGIN
window.login = async function () {
  const user = document.getElementById("li_user").value;
  const pass = document.getElementById("li_pass").value;

  const snap = await get(ref(db, "users/" + user));

  if (!snap.exists()) return alert("User not found");

  if (snap.val().password === pass) {
    localStorage.setItem("userId", user);
    loadBalance();
    loadMatches();
  } else {
    alert("Wrong password");
  }
};

// BALANCE
async function loadBalance() {
  const userId = localStorage.getItem("userId");
  const snap = await get(ref(db, "users/" + userId));
  document.getElementById("balance").innerText = snap.val().balance;
}

// MATCHES
async function loadMatches() {
  const res = await fetch("https://central.zplay1.in/pb/api/v1/events/matches/4");
  const json = await res.json();

  const container = document.getElementById("matches");
  container.innerHTML = "";

  json.data.forEach(match => {
    if (!match.runners || match.runners.length === 0) return;

    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${match.event_name}</h3>
      <button onclick="openMatch(${match.event_id})">
        Open Match
      </button>
    `;

    container.appendChild(div);
  });
}

window.openMatch = function (id) {
  window.location.href = "match.html?eventId=" + id;
};
</script>

</body>
</html>
