<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match - Allrounder Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow-x: hidden;
            font-size: 13px;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1229 100%);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d4a574;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: bold; color: #d4a574; letter-spacing: 2px; cursor: pointer; }
        .logo-small { font-size: 9px; display: block; color: #d4a574; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .balance-display { background: #0f1229; border: 1px solid #d4a574; border-radius: 6px; padding: 6px 12px; font-size: 13px; color: #d4a574; font-weight: 700; }

        /* MATCH HERO */
        .match-hero {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1229 100%);
            border-bottom: 1px solid #2a2f4a;
            padding: 12px 16px;
        }
        .league-name { color: #d4a574; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .match-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .match-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-live { background: #dc3545; animation: pulse 1.5s infinite; }
        .status-upcoming { background: #6c757d; }
        .status-ended { background: #343a40; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .match-date-time { color: #b0b8d4; font-size: 11px; }
        .inplay-dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }

        /* TABS */
        .tab-nav {
            display: flex;
            background: #1a1f3a;
            border-bottom: 1px solid #2a2f4a;
            overflow-x: auto;
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 10px 16px;
            background: none;
            border: none;
            color: #b0b8d4;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .odds-scroll::-webkit-scrollbar {
    display: none;
        }
        .odds-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.odds-table {
    min-width: 600px; /* important */
}
        .tab-btn.active { color: #d4a574; border-bottom-color: #d4a574; }

        /* SECTIONS */
        .section { margin-bottom: 6px; }
        .section-header {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-header.bookmaker-hdr { background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%); }
        .section-header.fancy-hdr { background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); }
        .section-header.premium-hdr { background: linear-gradient(135deg, #6a1b9a 0%, #4a148c 100%); }

        /* MATCH ODDS TABLE */
        .odds-table { width: 100%; }
        .odds-table-header {
            display: grid;
            grid-template-columns: 1fr 80px 80px 80px 80px 80px 80px;
            background: #0f1229;
            padding: 6px 14px;
            font-size: 11px;
            color: #b0b8d4;
            border-bottom: 1px solid #2a2f4a;
        }
        .odds-table-header .back-lbl { color: #4dabf7; text-align: center; grid-column: 2/5; }
        .odds-table-header .lay-lbl { color: #f08080; text-align: center; grid-column: 5/8; }

        .runner-row {
            display: grid;
            grid-template-columns: 1fr 80px 80px 80px 80px 80px 80px;
            align-items: center;
            border-bottom: 1px solid #1a1f3a;
            padding: 0 14px;
            background: #12172e;
            min-height: 52px;
        }
        .runner-row:hover { background: #1a2040; }

        .runner-name-col { padding: 8px 0; }
        .runner-name { font-weight: 700; font-size: 13px; }
        .runner-profit { font-size: 11px; margin-top: 2px; }
        .runner-profit.green { color: #28a745; }
        .runner-profit.red { color: #dc3545; }

        .odd-cell {
            text-align: center;
            padding: 4px 3px;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s;
            margin: 4px 2px;
        }
        .odd-cell:active { transform: scale(0.95); }
        .odd-cell .price { font-size: 14px; font-weight: 700; }
        .odd-cell .size { font-size: 10px; color: rgba(255,255,255,0.6); }

        .back-cell { background: #4dabf720; border: 1px solid #4dabf740; }
        .back-cell:hover { background: #4dabf740; }
        .back-cell .price { color: #4dabf7; }
        .lay-cell { background: #f0808020; border: 1px solid #f0808040; }
        .lay-cell:hover { background: #f0808040; }
        .lay-cell .price { color: #f08080; }
        .odd-cell.best-back { background: #4dabf7; }
        .odd-cell.best-back .price { color: #0a0e27; }
        .odd-cell.best-back .size { color: rgba(0,0,0,0.6); }
        .odd-cell.best-lay { background: #f08080; }
        .odd-cell.best-lay .price { color: #0a0e27; }
        .odd-cell.best-lay .size { color: rgba(0,0,0,0.6); }

        /* SUSPENDED OVERLAY */
        .suspended-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(220,53,69,0.15);
            grid-column: 2/8;
            height: 100%;
            font-weight: 700;
            color: #dc3545;
            font-size: 12px;
            letter-spacing: 2px;
            border: 1px solid #dc354540;
            border-radius: 4px;
            margin: 4px 0;
        }

        /* BOOKMAKER TABLE */
        .bm-table-header {
            display: grid;
            grid-template-columns: 1fr 90px 90px;
            background: #0f1229;
            padding: 6px 14px;
            font-size: 11px;
            color: #b0b8d4;
            border-bottom: 1px solid #2a2f4a;
        }
        .bm-row {
            display: grid;
            grid-template-columns: 1fr 90px 90px;
            align-items: center;
            border-bottom: 1px solid #1a1f3a;
            padding: 4px 14px;
            background: #12172e;
            min-height: 48px;
        }
        .bm-odd-cell {
            text-align: center;
            padding: 6px 4px;
            cursor: pointer;
            border-radius: 4px;
            margin: 2px;
            transition: transform 0.1s;
        }
        .bm-odd-cell:active { transform: scale(0.95); }
        .bm-back { background: #4dabf7; color: #0a0e27; font-weight: 700; }
        .bm-back:hover { background: #74c0fc; }
        .bm-lay { background: #f08080; color: #0a0e27; font-weight: 700; }
        .bm-lay:hover { background: #ffa8a8; }
        .bm-odd-price { font-size: 14px; font-weight: 700; }
        .bm-odd-size { font-size: 10px; opacity: 0.7; }

        /* FANCY TABLE */
        .fancy-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1a1f3a;
            padding: 6px 14px;
            background: #12172e;
            gap: 8px;
            min-height: 48px;
        }
        .fancy-row:hover { background: #1a2040; }
        .fancy-name { flex: 1; font-size: 12px; font-weight: 600; color: #e0e6ff; }
        .fancy-msg { font-size: 10px; color: #ffd43b; margin-top: 2px; }
        .fancy-cell {
            width: 80px;
            text-align: center;
            padding: 6px 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .fancy-cell:active { transform: scale(0.95); }
        .fancy-no { background: #f08080; color: #0a0e27; }
        .fancy-no:hover { background: #ffa8a8; }
        .fancy-yes { background: #4dabf7; color: #0a0e27; }
        .fancy-yes:hover { background: #74c0fc; }
        .fancy-price { font-size: 14px; font-weight: 700; }
        .fancy-run { font-size: 10px; opacity: 0.8; }

        /* BET SLIP */
        .bet-slip-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            justify-content: flex-end;
            align-items: flex-end;
        }
        .bet-slip-overlay.active { display: flex; }
        .bet-slip {
            background: #1a1f3a;
            width: 100%;
            max-width: 480px;
            border-top: 2px solid #d4a574;
            border-radius: 12px 12px 0 0;
            padding: 16px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .bet-slip-title { color: #d4a574; font-weight: 700; font-size: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .bet-info { background: #0f1229; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
        .bet-info-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .bet-info-label { color: #b0b8d4; }
        .bet-info-value { font-weight: 700; }
        .bet-info-value.back { color: #4dabf7; }
        .bet-info-value.lay { color: #f08080; }

        .stake-section { margin-bottom: 12px; }
        .stake-label { color: #b0b8d4; font-size: 12px; margin-bottom: 6px; }
        .stake-input { width: 100%; padding: 10px; background: #0f1229; border: 1px solid #d4a574; border-radius: 6px; color: #fff; font-size: 16px; font-weight: 700; text-align: center; }
        .stake-input:focus { outline: none; border-color: #f0ad4e; }

        .quick-stakes { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .quick-stake-btn {
            flex: 1; min-width: 60px;
            padding: 8px 4px;
            background: #0f1229;
            border: 1px solid #2a2f4a;
            color: #d4a574;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
        }
        .quick-stake-btn:hover { background: #d4a574; color: #0a0e27; }

        .pnl-row { display: flex; justify-content: space-between; background: #0f1229; padding: 8px 14px; border-radius: 6px; margin-bottom: 12px; }
        .pnl-label { font-size: 11px; color: #b0b8d4; }
        .pnl-value { font-size: 13px; font-weight: 700; }
        .pnl-value.profit { color: #28a745; }
        .pnl-value.loss { color: #dc3545; }

        .place-bet-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4a574 0%, #c49060 100%);
            color: #0a0e27;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .place-bet-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(212,165,116,0.4); }
        .place-bet-btn:disabled { background: #555; color: #999; cursor: not-allowed; transform: none; }

        /* TOAST / POPUP */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1f3a;
            border: 2px solid #28a745;
            color: #fff;
            padding: 14px 20px;
            border-radius: 10px;
            z-index: 999;
            font-size: 13px;
            font-weight: 600;
            min-width: 260px;
            text-align: center;
            animation: toastIn 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .toast.error { border-color: #dc3545; }
        .toast.warning { border-color: #ffc107; }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

        /* SUCCESS POPUP */
        .success-popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        .success-popup-overlay.active { display: flex; }
        .success-popup {
            background: #1a1f3a;
            border: 2px solid #28a745;
            border-radius: 14px;
            padding: 30px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
        .success-icon { font-size: 48px; margin-bottom: 10px; }
        .success-title { font-size: 18px; font-weight: 700; color: #28a745; margin-bottom: 8px; }
        .success-msg { font-size: 13px; color: #b0b8d4; margin-bottom: 16px; line-height: 1.5; }
        .success-close-btn { padding: 10px 30px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }

        /* BET HISTORY */
        .bet-history-section { padding: 0 0 80px; }
        .bet-history-header { padding: 10px 14px; background: #1a1f3a; border-bottom: 1px solid #2a2f4a; font-weight: 700; font-size: 13px; color: #d4a574; }
        .bet-item {
            background: #12172e;
            border-bottom: 1px solid #1a1f3a;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .bet-item-left { flex: 1; }
        .bet-item-name { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
        .bet-item-meta { font-size: 11px; color: #b0b8d4; }
        .bet-item-right { text-align: right; }
        .bet-item-stake { font-weight: 700; font-size: 13px; }
        .bet-item-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 3px; display: inline-block; }
        .bet-status-pending { background: #ffc10720; color: #ffc107; border: 1px solid #ffc10740; }
        .bet-status-won { background: #28a74520; color: #28a745; border: 1px solid #28a74540; }
        .bet-status-lost { background: #dc354520; color: #dc3545; border: 1px solid #dc354540; }

        /* MATCH END BANNER */
        .match-ended-banner {
            background: linear-gradient(135deg, #dc3545 0%, #8b0000 100%);
            padding: 12px 16px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* MARKET SUSPENDED */
        .market-suspended {
            background: rgba(220,53,69,0.1);
            border: 1px solid #dc354540;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            color: #dc3545;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            margin: 4px 14px;
        }

        /* NO DATA */
        .no-data { padding: 20px; text-align: center; color: #b0b8d4; font-size: 12px; }

        /* LIVE REFRESH INDICATOR */
        .refresh-indicator { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #28a745; }
        .refresh-dot { width: 6px; height: 6px; background: #28a745; border-radius: 50%; animation: pulse 1s infinite; }

        /* BACK / HEADER NAV */
        .back-btn { color: #d4a574; font-size: 20px; cursor: pointer; background: none; border: none; padding: 4px; }

        /* TAB CONTENT */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* CATEGORY BADGE */
        .cat-badge { font-size: 9px; padding: 2px 6px; border-radius: 8px; background: #0f1229; color: #b0b8d4; margin-left: 6px; }

        /* BOTTOM PADDING */
        .pb80 { padding-bottom: 80px; }

        /* STATS ROW */
        .stats-row { display: flex; gap: 10px; padding: 10px 14px; background: #0f1229; overflow-x: auto; }
        .stat-pill { background: #1a1f3a; border: 1px solid #2a2f4a; border-radius: 20px; padding: 6px 12px; white-space: nowrap; font-size: 11px; }
        .stat-pill span { color: #d4a574; font-weight: 700; }

        /* WINNER LABEL */
        .winner-label { font-size: 10px; color: #ffd43b; font-weight: 700; letter-spacing: 1px; margin-top: 2px; }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
        <button class="back-btn" onclick="history.back()">&#8592;</button>
        <div class="logo" onclick="location.href='index.html'">
            ALLROUNDER
            <span class="logo-small">LIVE BETTING</span>
        </div>
    </div>
    <div class="header-right">
        <div class="balance-display">₹<span id="headerBalance">0</span></div>
    </div>
</div>

<!-- MATCH HERO -->
<div class="match-hero">
    <div class="league-name" id="leagueName">Loading...</div>
    <div class="match-title" id="matchTitle">—</div>
    <div class="match-meta">
        <span class="status-badge" id="statusBadge">—</span>
        <span class="match-date-time" id="matchDateTime">—</span>
        <span id="liveIndicator" style="display:none;"><span class="inplay-dot"></span></span>
        <span class="refresh-indicator" id="refreshIndicator" style="display:none;">
            <span class="refresh-dot"></span> LIVE
        </span>
    </div>
</div>

<!-- MATCH ENDED BANNER -->
<div class="match-ended-banner" id="endedBanner" style="display:none;">
    🏆 MATCH ENDED — WINNER: <span id="winnerDisplay">—</span>
</div>

<!-- TABS -->
<div class="tab-nav">
    
    <button class="tab-btn" onclick="switchTab('bookmaker',this)">Bookmaker</button>
    <button class="tab-btn active" onclick="switchTab('odds',this)">Match Odds</button>
  
    <button class="tab-btn" onclick="switchTab('fancy',this)">Fancy</button>
    <button class="tab-btn" onclick="switchTab('bets',this)">My Bets <span id="betCount" style="background:#d4a574;color:#0a0e27;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px;">0</span></button>
</div>

<!-- TAB: MATCH ODDS -->
<div id="tab-odds" class="tab-content active pb80">
    <div id="allMarketsContainer"></div>
</div>

<!-- TAB: BOOKMAKER -->
<div id="tab-bookmaker" class="tab-content pb80">
    <div id="bookmakersContainer"></div>
</div>

<!-- TAB: FANCY -->
<div id="tab-fancy" class="tab-content pb80">
    <div id="fancyContainer"></div>
</div>

<!-- TAB: MY BETS -->
<div id="tab-bets" class="tab-content">
    <div class="bet-history-section">
        <div class="bet-history-header">My Bets — This Match</div>
        <div id="betHistoryList"><div class="no-data">No bets placed yet</div></div>
    </div>
</div>

<!-- BET SLIP -->
<div class="bet-slip-overlay" id="betSlipOverlay" onclick="closeBetSlip(event)">
    <div class="bet-slip">
        <div class="bet-slip-title">
            <span>BET SLIP</span>
            <button onclick="closeBetSlipDirect()" style="background:none;border:none;color:#b0b8d4;font-size:20px;cursor:pointer;">×</button>
        </div>
        <div class="bet-info">
            <div class="bet-info-row">
                <span class="bet-info-label">Selection</span>
                <span class="bet-info-value" id="slipSelection">—</span>
            </div>
            <div class="bet-info-row">
                <span class="bet-info-label">Market</span>
                <span class="bet-info-value" id="slipMarket" style="font-size:11px;color:#b0b8d4;">—</span>
            </div>
            <div class="bet-info-row">
                <span class="bet-info-label">Type</span>
                <span class="bet-info-value" id="slipType">—</span>
            </div>
            <div class="bet-info-row">
                <span class="bet-info-label">Odds / Runs</span>
                <span class="bet-info-value" id="slipOdds">—</span>
            </div>
        </div>

        <div class="stake-section">
            <div class="stake-label">Stake Amount (Min: ₹100)</div>
            <input type="number" class="stake-input" id="stakeInput" value="100" min="100" oninput="updatePnl()" />
        </div>

        <div class="quick-stakes">
            <button class="quick-stake-btn" onclick="addStake(100)">+100</button>
            <button class="quick-stake-btn" onclick="addStake(500)">+500</button>
            <button class="quick-stake-btn" onclick="addStake(1000)">+1K</button>
            <button class="quick-stake-btn" onclick="addStake(5000)">+5K</button>
            <button class="quick-stake-btn" onclick="addStake(10000)">+10K</button>
            <button class="quick-stake-btn" onclick="clearStake()">CLR</button>
        </div>

        <div class="pnl-row">
            <div>
                <div class="pnl-label">Potential Profit</div>
                <div class="pnl-value profit" id="potentialProfit">₹0</div>
            </div>
            <div style="text-align:right;">
                <div class="pnl-label">Potential Loss</div>
                <div class="pnl-value loss" id="potentialLoss">₹0</div>
            </div>
        </div>

        <button class="place-bet-btn" id="placeBetBtn" onclick="submitBet()">PLACE BET</button>
    </div>
</div>

<!-- SUCCESS POPUP -->
<div class="success-popup-overlay" id="successPopup">
    <div class="success-popup">
        <div class="success-icon">✅</div>
        <div class="success-title">Bet Placed!</div>
        <div class="success-msg" id="successMsg">Your bet has been placed successfully.</div>
        <button class="success-close-btn" onclick="closeSuccessPopup()">OK</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBEITIEDtG_Yq2iBlb7sjJWnnFIzE5C8r8",
    authDomain: "fun-play-33764.firebaseapp.com",
    databaseURL: "https://fun-play-33764-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "fun-play-33764"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const eventId = new URLSearchParams(location.search).get("eventId");
let matchEnded = false;
let currentBetData = null;
let matchData = null;
let controlData = null;

// ============ INIT ============
init();

async function init() {
    if (!localStorage.getItem("userId")) {
        showToast("Please login to bet", "error");
    }
    loadBalance();
    await loadControl();
    await loadMatch();
    loadBetHistory();

    // Auto refresh every 1 second
    setInterval(async () => {
        if (!matchEnded) {

            await loadMatch(true); // silent refresh
        }

// ============ CONTROL ============
async function loadControl() {
    try {
        const res = await fetch("https://allrounderlive.in/control.json?t=" + Date.now());
        controlData = await res.json();
        const c = controlData[eventId];

        if (c && c.status === "ENDED") {
            matchEnded = true;
            document.getElementById("endedBanner").style.display = "block";
            const winnerSid = c.winner;
            if (matchData) {
                const winRunner = matchData.selection_runners?.find(r => r.SID == winnerSid);
                document.getElementById("winnerDisplay").innerText = winRunner ? winRunner.RN : winnerSid;
            }
            checkSettlement(c.winner);
        }

        const statusBadge = document.getElementById("statusBadge");
        if (c?.status === "ENDED") {
            statusBadge.className = "status-badge status-ended";
            statusBadge.innerText = "ENDED";
        } else if (matchData?.inplay) {
            statusBadge.className = "status-badge status-live";
            statusBadge.innerText = "🔴 LIVE";
            document.getElementById("liveIndicator").style.display = "inline-block";
            document.getElementById("refreshIndicator").style.display = "flex";
        } else {
            statusBadge.className = "status-badge status-upcoming";
            statusBadge.innerText = c?.status || "UPCOMING";
        }
    } catch (e) { console.log("Control load error", e); }
}

// ============ LOAD MATCH ============
async function loadMatch(silent = false) {
    try {
        const res = await fetch(`https://central.zplay1.in/pb/api/v1/events/matchDetails/${eventId}?t=${Date.now()}`);
        const json = await res.json();
        if (!json.success) return;
        matchData = json.data.match;

        if (!silent) renderMatchInfo();
        renderMatchOdds();
        renderBookmakers();
        renderFancy();
    } catch (e) { console.log("Match load error", e); }
}

function renderMatchInfo() {
    document.getElementById("leagueName").innerText = matchData.leaguesName || "Cricket";
    document.getElementById("matchTitle").innerText = matchData.eventName || "—";
    const d = new Date(matchData.eventDate);
    document.getElementById("matchDateTime").innerText = d.toLocaleDateString("en-IN", {day:"2-digit",month:"short",year:"numeric"}) + " • " + d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    document.title = matchData.eventName + " — Allrounder Live";
}

// ============ MATCH ODDS (ALL MARKETS) ============
function renderMatchOdds() {
    const container = document.getElementById("allMarketsContainer");
    if (!matchData?.matchOddData?.length) {
        container.innerHTML = '<div class="no-data">No markets available</div>';
        return;
    }
    container.innerHTML = "";

    matchData.matchOddData.forEach(market => {
        const suspended = market.st !== "OPEN";
        const div = document.createElement("div");
        div.className = "section";
        div.id = `market-${market.id}`;

        const runnerNames = market.runnerName || matchData.selection_runners || [];

        let runnersHTML = "";
        market.runners.forEach(r => {
            const info = runnerNames.find(n => n.SID == r.sid || n.SID == r.sid);
            const name = info?.RN || r.sid;
            const backs = r.ex?.b || [];
            const lays = r.ex?.l || [];

            // Profit/loss preview
            const existingBets = getLocalBets().filter(b => b.eventId == eventId && b.selectionId == r.sid);
            const profit = existingBets.reduce((s,b) => s + (b.stake * (b.odds-1)), 0);
            const loss = existingBets.reduce((s,b) => s - b.stake, 0);

            let profitHTML = "";
            if (existingBets.length > 0) {
                profitHTML = `
                    <div class="runner-profit green">+₹${profit.toFixed(0)} if wins</div>
                    <div class="runner-profit red">₹${loss.toFixed(0)} if loses</div>`;
            }

            // Winner label
            const c = controlData?.[eventId];
            let winnerHTML = "";
            if (c?.status === "ENDED" && c?.winner == r.sid) {
                winnerHTML = `<div class="winner-label">🏆 WINNER</div>`;
            }

            // Back cells (show 3: best first, then 2 others)
            const backCells = [0,1,2].map(i => {
                const b = backs[i];
                if (!b) return `<div class="odd-cell ${i===0?'best-back':'back-cell'}"><div class="price">—</div><div class="size">—</div></div>`;
                return `<div class="odd-cell ${i===0?'best-back':'back-cell'}" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)}','back',${b.p},${b.s})">
                    <div class="price">${b.p}</div><div class="size">${fmtSize(b.s)}</div></div>`;
            });

            // Lay cells
            const layCells = [0,1,2].map(i => {
                const l = lays[i];
                if (!l) return `<div class="odd-cell ${i===0?'best-lay':'lay-cell'}"><div class="price">—</div><div class="size">—</div></div>`;
                return `<div class="odd-cell ${i===0?'best-lay':'lay-cell'}" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)}','lay',${l.p},${l.s})">
                    <div class="price">${l.p}</div><div class="size">${fmtSize(l.s)}</div></div>`;
            });

            runnersHTML += `
                <div class="runner-row">
                    <div class="runner-name-col">
                        <div class="runner-name">${escHtml(name)}</div>
                        ${winnerHTML}
                        ${profitHTML}
                    </div>
                    ${suspended ? `<div class="suspended-overlay">SUSPENDED</div>` : (backCells.join('') + layCells.join(''))}
                </div>`;
        });

        div.innerHTML = `
            <div class="section-header">
                <span>${escHtml(market.marketName)}</span>
                <span style="font-size:10px;color:rgba(255,255,255,0.7);">Min: ₹${market.min_stake_limit} | Max: ₹${market.inplay_stake_limit?.toLocaleString()}</span>
            </div>
            <div class="odds-table">
                <div class="odds-table-header">
                    <span></span>
                    <span class="back-lbl">← BACK</span>
                    <span class="lay-lbl">LAY →</span>
                </div>
                ${runnersHTML}
            </div>`;
        container.appendChild(div);
    });
}

// ============ BOOKMAKERS ============
function renderBookmakers() {
    const container = document.getElementById("bookmakersContainer");
    if (!matchData?.hasBookmaker) {
        container.innerHTML = '<div class="no-data">No bookmaker markets available</div>';
        return;
    }

    // Find bookmaker-like markets (matchOddData has simpler back/lay = bookmaker style)
    const bmMarkets = matchData.matchOddData.filter(m => m.marketName === "Who Will Win The Match?" || m.marketName?.toLowerCase().includes("bookmaker"));
    if (!bmMarkets.length) {
        // Use first market as bookmaker demo
        const m = matchData.matchOddData[0];
        if (!m) { container.innerHTML = '<div class="no-data">No bookmaker data</div>'; return; }
        renderBookmakerMarket(container, m);
    } else {
        container.innerHTML = "";
        bmMarkets.forEach(m => renderBookmakerMarket(container, m));
    }
}

function renderBookmakerMarket(container, market) {
    const runnerNames = market.runnerName || matchData.selection_runners || [];
    let rowsHTML = "";
    market.runners.forEach(r => {
        const info = runnerNames.find(n => n.SID == r.sid);
        const name = info?.RN || r.sid;
        const back = r.ex?.b?.[0];
        const lay = r.ex?.l?.[0];

        // Profit/loss
        const existingBets = getLocalBets().filter(b => b.eventId == eventId && b.selectionId == r.sid);
        const profit = existingBets.reduce((s,b) => s + (b.stake * (b.odds-1)), 0);
        const loss = existingBets.reduce((s,b) => s - b.stake, 0);
        let profitHTML = "";
        if (existingBets.length > 0) {
            profitHTML = `<div class="runner-profit green" style="font-size:10px;">+₹${profit.toFixed(0)}</div><div class="runner-profit red" style="font-size:10px;">₹${loss.toFixed(0)}</div>`;
        }

        rowsHTML += `
            <div class="bm-row">
                <div>
                    <div class="runner-name">${escHtml(name)}</div>
                    ${profitHTML}
                </div>
                <div class="bm-odd-cell bm-back" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)} (BM)','back',${back?.p||0},${back?.s||0})">
                    <div class="bm-odd-price">${back?.p || '—'}</div>
                    <div class="bm-odd-size">${back ? fmtSize(back.s) : ''}</div>
                </div>
                <div class="bm-odd-cell bm-lay" onclick="openBetSlip(${r.sid},'${escHtml(name)}','${escHtml(market.marketName)} (BM)','lay',${lay?.p||0},${lay?.s||0})">
                    <div class="bm-odd-price">${lay?.p || '—'}</div>
                    <div class="bm-odd-size">${lay ? fmtSize(lay.s) : ''}</div>
                </div>

    });

    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `
        <div class="section-header bookmaker-hdr">
            <span>📋 BOOKMAKER — ${escHtml(market.marketName)}</span>
            <span style="font-size:10px;color:rgba(255,255,255,0.7);">Max: ₹${market.stake_limit?.toLocaleString()}</span>
        </div>
        <div class="bm-table-header">
            <span>Selection</span>
            <span style="text-align:center;color:#4dabf7;">BACK</span>
            <span style="text-align:center;color:#f08080;">LAY</span>
        </div>
        ${rowsHTML}`;
    container.appendChild(sec);
}

// ============ FANCY ============
function renderFancy() {
    const container = document.getElementById("fancyContainer");
    const fancyData = matchData?.fancyOddData?.ml;
    if (!fancyData?.length) {
        container.innerHTML = '<div class="no-data">No fancy markets available</div>';
        return;
    }
    container.innerHTML = "";

    // Group by category
    const groups = {};
    fancyData.forEach(f => {
        const cat = f.cat || "other";
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(f);
    });

    Object.entries(groups).forEach(([cat, items]) => {
        const catLabel = cat.replace(/_/g," ").toUpperCase();
        const sec = document.createElement("div");
        sec.className = "section";

        let rowsHTML = "";
        items.forEach(f => {
            const susp = f.sn !== "ONLINE";
            rowsHTML += `
                <div class="fancy-row">
                    <div class="fancy-name">
                        ${escHtml(f.mn)}
                        ${f.msg ? `<div class="fancy-msg">${escHtml(f.msg)}</div>` : ''}
                    </div>
                    ${susp ? `<div style="color:#dc3545;font-size:11px;font-weight:700;letter-spacing:1px;">SUSPENDED</div>` : `
                    <div class="fancy-cell fancy-no" onclick="openFancyBetSlip(${f.mi},'${escHtml(f.mn)}','no',${f.rn},${f.on})">
                        <div class="fancy-price">${f.rn}</div>
                        <div class="fancy-run">${f.on}%</div>

            </div>
            <div style="display:flex;background:#0f1229;padding:4px 14px;font-size:10px;color:#b0b8d4;border-bottom:1px solid #1a1f3a;">
                <span style="flex:1;">Market</span>
                <span style="width:80px;text-align:center;color:#f08080;">NO</span>
                <span style="width:80px;text-align:center;color:#4dabf7;">YES</span>

        container.appendChild(sec);
    });

// ============ BET SLIP ============
window.openBetSlip = function(selectionId, name, market, type, odds, size) {
    if (!localStorage.getItem("userId")) { showToast("Please login to bet", "error"); return; }
    if (matchEnded) { showToast("Match has ended. Betting closed.", "warning"); return; }
    if (!odds || odds === 0) { showToast("Invalid odds", "error"); return; }

    currentBetData = { selectionId, name, market, type, odds, size, isFancy: false };
    document.getElementById("slipSelection").innerText = name;
    document.getElementById("slipMarket").innerText = market;
    document.getElementById("slipType").innerText = type.toUpperCase();
    document.getElementById("slipType").className = "bet-info-value " + type;
    document.getElementById("slipOdds").innerText = odds;
    document.getElementById("stakeInput").value = 100;
    updatePnl();
    document.getElementById("betSlipOverlay").classList.add("active");
};

window.openFancyBetSlip = function(marketId, marketName, type, runs, pct) {
    if (!localStorage.getItem("userId")) { showToast("Please login to bet", "error"); return; }
    if (matchEnded) { showToast("Match has ended. Betting closed.", "warning"); return; }

    currentBetData = { selectionId: marketId, name: marketName, market: "Fancy", type, odds: pct/100, runs, isFancy: true };
    document.getElementById("slipSelection").innerText = marketName;
    document.getElementById("slipMarket").innerText = "Fancy";
    document.getElementById("slipType").innerText = type.toUpperCase() + " @ " + runs + " runs";
    document.getElementById("slipType").className = "bet-info-value " + (type==="yes"?"back":"lay");
    document.getElementById("slipOdds").innerText = runs + " runs @ " + pct + "%";
    document.getElementById("stakeInput").value = 100;
    updatePnl();
    document.getElementById("betSlipOverlay").classList.add("active");
};

window.closeBetSlip = function(e) {
    if (e.target === document.getElementById("betSlipOverlay")) closeBetSlipDirect();
};
window.closeBetSlipDirect = function() {
    document.getElementById("betSlipOverlay").classList.remove("active");
};

window.updatePnl = function() {
    if (!currentBetData) return;
    const stake = parseFloat(document.getElementById("stakeInput").value) || 0;
    let profit, loss;

    if (currentBetData.isFancy) {
        profit = stake * currentBetData.odds;
        loss = stake;
    } else if (currentBetData.type === "back") {
        profit = stake * (currentBetData.odds - 1);
        loss = stake;
    } else {
        profit = stake;
        loss = stake * (currentBetData.odds - 1);
    }

    document.getElementById("potentialProfit").innerText = "₹" + profit.toFixed(0);
    document.getElementById("potentialLoss").innerText = "₹" + loss.toFixed(0);
};

window.addStake = function(amt) {
    const input = document.getElementById("stakeInput");
    input.value = (parseFloat(input.value) || 0) + amt;
    updatePnl();
};

window.clearStake = function() {
    document.getElementById("stakeInput").value = 100;
    updatePnl();
};

// ============ SUBMIT BET ============
window.submitBet = async function() {
    if (!currentBetData) return;
    if (matchEnded) { showToast("Match has ended. Betting closed.", "warning"); return; }

    const userId = localStorage.getItem("userId");
    if (!userId) { showToast("Please login", "error"); return; }

    const stake = parseFloat(document.getElementById("stakeInput").value) || 0;
    if (stake < 100) { showToast("Minimum stake is ₹100", "error"); return; }

    document.getElementById("placeBetBtn").disabled = true;
    document.getElementById("placeBetBtn").innerText = "Placing...";

    try {
        const userRef = ref(db, "users/" + userId);
        const snap = await get(userRef);
        if (!snap.exists()) throw new Error("User not found");

        let balance = snap.val().balance;
        if (balance < stake) { showToast("Insufficient balance", "error"); return; }

        balance -= stake;
        await update(userRef, { balance });

        const betRecord = {
            userId,
            eventId,
            matchName: matchData?.eventName || "",
            selectionId: currentBetData.selectionId,
            selectionName: currentBetData.name,
            market: currentBetData.market,
            type: currentBetData.type,
            odds: currentBetData.odds,
            runs: currentBetData.runs || null,
            stake,
            status: "PENDING",
            timestamp: Date.now(),
            isFancy: currentBetData.isFancy || false
        };

        // Save to Firebase
        await push(ref(db, "bets"), betRecord);

        // Save to localStorage
        const localBets = getLocalBets();
        betRecord.localId = Date.now() + Math.random();
        localBets.push(betRecord);
        localStorage.setItem("bets_" + userId, JSON.stringify(localBets));

        // Update UI
        closeBetSlipDirect();
        loadBalance();
        loadBetHistory();
        renderMatchOdds();
        renderBookmakers();

        // Show success popup
        const profit = currentBetData.isFancy
            ? stake * currentBetData.odds
            : currentBetData.type === "back"
                ? stake * (currentBetData.odds - 1)
                : stake;

        document.getElementById("successMsg").innerHTML = `
            <b>${escHtml(currentBetData.name)}</b><br>
            ${currentBetData.type.toUpperCase()} @ ${currentBetData.runs ? currentBetData.runs + " runs" : currentBetData.odds}<br>
            Stake: ₹${stake.toLocaleString()}<br>
            <span style="color:#28a745;">Potential Profit: ₹${profit.toFixed(0)}</span>
        `;
        document.getElementById("successPopup").classList.add("active");

    } catch (e) {
        showToast("Error: " + e.message, "error");
    } finally {
        document.getElementById("placeBetBtn").disabled = false;
        document.getElementById("placeBetBtn").innerText = "PLACE BET";
    }
};

window.closeSuccessPopup = function() {
    document.getElementById("successPopup").classList.remove("active");
};

// ============ BET HISTORY ============
function loadBetHistory() {
    const userId = localStorage.getItem("userId");
    if (!userId) return;

    const bets = getLocalBets().filter(b => b.eventId == eventId);
    const container = document.getElementById("betHistoryList");
    document.getElementById("betCount").innerText = bets.length;

    if (!bets.length) {
        container.innerHTML = '<div class="no-data">No bets placed yet</div>';
        return;
    }

    // Sort newest first
    bets.sort((a,b) => b.timestamp - a.timestamp);

    container.innerHTML = bets.map(b => {
        const statusClass = b.status === "WON" ? "bet-status-won" : b.status === "LOST" ? "bet-status-lost" : "bet-status-pending";
        const profit = b.isFancy
            ? b.stake * b.odds
            : b.type === "back" ? b.stake * (b.odds-1) : b.stake;
        const time = new Date(b.timestamp).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});

        return `
            <div class="bet-item">
                <div class="bet-item-left">
                    <div class="bet-item-name">${escHtml(b.selectionName || b.selectionId)}</div>
                    <div class="bet-item-meta">${escHtml(b.market)} • ${b.type?.toUpperCase()} • ${b.runs ? b.runs+" runs" : "@ "+b.odds} • ${time}</div>
                    <div class="runner-profit green" style="font-size:11px;">Potential: +₹${profit.toFixed(0)}</div>
                </div>
                <div class="bet-item-right">
                    <div class="bet-item-stake">₹${b.stake?.toLocaleString()}</div>
                    <div><span class="bet-item-status ${statusClass}">${b.status}</span></div>
                </div>
            </div>`;
    }).join("");
}

// ============ SETTLEMENT ============
async function checkSettlement(winnerId) {
    const userId = localStorage.getItem("userId");
    if (!userId) return;

    const bets = getLocalBets().filter(b => b.eventId == eventId && b.status === "PENDING");
    if (!bets.length) return;

    const userRef = ref(db, "users/" + userId);
    const snap = await get(userRef);
    let balance = snap.val().balance;
    let updated = false;

    const allBets = getLocalBets();
    allBets.forEach(b => {
        if (b.eventId != eventId || b.status !== "PENDING") return;
        if (b.isFancy) { b.status = "PENDING"; return; } // fancy settled by admin
        if (String(b.selectionId) === String(winnerId)) {
            const winAmt = b.stake + b.stake * (b.odds - 1);
            balance += winAmt;
            b.status = "WON";
            updated = true;
        } else {
            b.status = "LOST";
            updated = true;
        }
    });

    if (updated) {
        localStorage.setItem("bets_" + userId, JSON.stringify(allBets));
        await update(userRef, { balance });
        loadBalance();
        loadBetHistory();
    }
}

// ============ BALANCE ============
async function loadBalance() {
    const userId = localStorage.getItem("userId");
    if (!userId) return;
    try {
        const snap = await get(ref(db, "users/" + userId));
        const bal = snap.val()?.balance || 0;
        document.getElementById("headerBalance").innerText = bal.toLocaleString();
    } catch(e) {}
}

// ============ LOCAL BETS ============
function getLocalBets() {
    const userId = localStorage.getItem("userId");
    if (!userId) return [];
    try {
        return JSON.parse(localStorage.getItem("bets_" + userId) || "[]");
    } catch { return []; }
}

// ============ TABS ============
window.switchTab = function(name, el) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    el.classList.add("active");
    if (name === "bets") loadBetHistory();
};

// ============ HELPERS ============
function fmtSize(s) {
    const n = parseFloat(s);
    if (n >= 100000) return (n/100000).toFixed(1) + "L";
    if (n >= 1000) return (n/1000).toFixed(1) + "K";
    return n.toFixed(0);
}

function escHtml(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

window.showToast = function(msg, type="success") {
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const t = document.createElement("div");
    t.className = "toast " + type;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
};
</script>
