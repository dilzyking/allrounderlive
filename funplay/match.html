<!DOCTYPE html>
<html>
<body>

<h2 id="matchName"></h2>
<p>Status: <span id="status"></span></p>
<h3>Balance: ₹<span id="balance">0</span></h3>

<div id="odds"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update, push }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEITIEDtG_Yq2iBlb7sjJWnnFIzE5C8r8",
  authDomain: "fun-play-33764.firebaseapp.com",
  databaseURL: "https://fun-play-33764-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fun-play-33764"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const eventId = new URLSearchParams(location.search).get("eventId");

loadBalance();
loadMatch();
checkSettlement();

// BALANCE
async function loadBalance() {
  const userId = localStorage.getItem("userId");
  const snap = await get(ref(db, "users/" + userId));
  document.getElementById("balance").innerText = snap.val().balance;
}

// LOAD MATCH
async function loadMatch() {
  const res = await fetch(
    "https://central.zplay1.in/pb/api/v1/events/matchDetails/" + eventId
  );
  const json = await res.json();
  const match = json.data.match;

  document.getElementById("matchName").innerText = match.eventName;

  const controlRes = await fetch("https://allrounderlive.in/control.json");
  const control = await controlRes.json();
  const c = control[eventId];

  document.getElementById("status").innerText =
    c?.status || "UPCOMING";

  const market = match.matchOddData[0];
  const oddsDiv = document.getElementById("odds");
  oddsDiv.innerHTML = "";

  market.runners.forEach(r => {
    const price = r.ex.b[0]?.p;
    const team = match.selection_runners.find(x => x.SID == r.sid)?.RN;

    const btn = document.createElement("button");
    btn.innerText = team + " @ " + price;

    btn.onclick = () => placeBet(r.sid, price);

    oddsDiv.appendChild(btn);
  });
}

// PLACE BET
async function placeBet(selectionId, odds) {
  const userId = localStorage.getItem("userId");

  const userRef = ref(db, "users/" + userId);
  const snap = await get(userRef);

  let bal = snap.val().balance;

  if (bal < 100) return alert("Low balance");

  bal -= 100;

  await update(userRef, { balance: bal });

  await push(ref(db, "bets"), {
    userId,
    eventId,
    selectionId,
    odds,
    stake: 100,
    status: "PENDING"
  });

  alert("Bet placed");
  loadBalance();
}

// AUTO RESULT
async function checkSettlement() {
  const res = await fetch("https://allrounderlive.in/control.json");
  const control = await res.json();
  const c = control[eventId];

  if (!c || c.status !== "ENDED") return;

  const winner = c.winner;

  const betsSnap = await get(ref(db, "bets"));

  betsSnap.forEach(async (betDoc) => {
    const bet = betDoc.val();

    if (bet.eventId != eventId) return;
    if (bet.status !== "PENDING") return;

    const userRef = ref(db, "users/" + bet.userId);

    if (bet.selectionId == winner) {
      const winAmount = bet.stake * bet.odds;

      const userSnap = await get(userRef);
      let balance = userSnap.val().balance;

      balance += winAmount;

      await update(userRef, { balance });

      await update(ref(db, "bets/" + betDoc.key), {
        status: "WON"
      });

    } else {
      await update(ref(db, "bets/" + betDoc.key), {
        status: "LOST"
      });
    }
  });
}
</script>

</body>
</html>
